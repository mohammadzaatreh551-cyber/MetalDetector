name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip and Build
        run: |
          ls -la
          unzip "MetalDetector-APK (1).zip" || unzip MetalDetector.zip || unzip MetalDetectorUSB.zip
          find . -name "gradlew" -type f
          GRADLEW=$(find . -name "gradlew" -type f | head -1)
          chmod +x "$GRADLEW"
          cd $(dirname "$GRADLEW")
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
